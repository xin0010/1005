            const [products, setProducts] = useState(INITIAL_PRODUCTS);
            const [cart, setCart] = useState([]);
            const [activeTab, setActiveTab] = useState('shop');
            const [selectedProduct, setSelectedProduct] = useState(null);
            const [showLoginModal, setShowLoginModal] = useState(false);
            const [user, setUser] = useState(null);
            const [toastMessage, setToastMessage] = useState(null);

            // 自訂 Toast 訊息提示
            const showToast = (message) => {
                setToastMessage(message);
                setTimeout(() => {
                    setToastMessage(null);
                }, 3000);
            };

            const addToCart = (product) => {
                if (product.stock > 0) {
                    setCart([...cart, { ...product, cartId: Date.now() }]);
                    setProducts(products.map(p => p.id === product.id ? { ...p, stock: p.stock - 1 } : p));
                    showToast(`🛒 已成功將 [${product.title}] 加入購物車！`);
                } else {
                    showToast(`⚠️ 抱歉，該商品已無庫存！`);
                }
            };

            const removeFromCart = (cartId, productId) => {
                setCart(cart.filter(item => item.cartId !== cartId));
                setProducts(products.map(p => p.id === productId ? { ...p, stock: p.stock + 1 } : p));
                showToast(`🗑️ 已從購物車移除該項目。`);
            };

            const handleCheckout = () => {
                if (!user) {
                    showToast(`🔑 請先登入會員再進行結帳！`);
                    setShowLoginModal(true);
                    return;
                }
                const totalAmount = cart.reduce((sum, item) => sum + item.price, 0);
                showToast(`🎉 結帳成功！已扣除模擬金額：$${totalAmount}`);
                setCart([]);
            };

            const handleLogin = (e) => {
                e.preventDefault();
                const username = e.target.username.value;
                if(username.trim()) {
                    setUser({ username });
                    setShowLoginModal(false);
                    showToast(`👋 歡迎回來，${username}！`);
                }
            };

            const handleLogout = () => {
                setUser(null);
                showToast(`🚪 已成功登出會員帳號。`);
            };

            const filteredProducts = products.filter(p => p.category === activeTab);

            return (
                <div className="min-h-screen flex text-gray-100 bg-gray-950">
                    
                    {/* Toast 訊息元件 */}
                    {toastMessage && (
                        <div className="fixed top-5 right-5 z-50 bg-gray-900 border border-pink-500/50 text-pink-400 px-6 py-4 rounded-xl shadow-[0_0_20px_rgba(219,39,119,0.3)] flex items-center gap-3 animate-bounce">

                                src="image_e86ca2.png" 
                                alt="Logo" 
                                className="w-12 h-12 rounded-lg border border-purple-500 shadow-[0_0_10px_rgba(168,85,247,0.5)] bg-slate-950"

                            />

                            </div>
                        </div>

                        {/* 導航選單 */}

                                onClick={() => setActiveTab('shop')} 
                                className={`flex items-center gap-3 w-full p-3 rounded-xl transition-all font-medium ${activeTab === 'shop' ? 'gradient-bg text-white shadow-lg' : 'hover:bg-purple-900/20 text-gray-300'}`}

                                <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" /></svg>
                                首頁
                            </button>

                                onClick={() => setActiveTab('pc')}

                            </button>
                            
                            <button 
                                onClick={() => setActiveTab('ios')}

                                    <h2 className="text-4xl md:text-5xl font-extrabold mb-6 tracking-wider">

                                        <span className="gradient-text ml-2 drop-shadow-[0_0_15px_rgba(219,39,119,0.5)]">AXGSHOP</span>
                                    </h2>
                                    <p className="text-lg md:text-xl text-gray-300 max-w-md mx-auto mb-8 font-medium">
                                        最新商品，即刻擁有
                                    </p>
                                    <div className="flex flex-wrap gap-4 justify-center">
                                        <button 
                                            onClick={() => setActiveTab('pc')} 
                                            className="px-8 py-3.5 rounded-xl gradient-bg text-white font-bold tracking-wider hover:scale-105 active:scale-95 transition-all shadow-[0_0_20px_rgba(168,85,247,0.5)]"
                                        >
                                            進入商城
                                        </button>
                                        <a 
                                            href="https://discord.gg/B6eNEhgJ4W" 
                                            target="_blank"
                                            rel="noopener noreferrer"

                                            前往 PC 商城

                                        {/* 商品清單 */}
                                        <div className="lg:col-span-2 space-y-4">
                                            {cart.map((item) => (
                                                <div key={item.cartId} className="bg-gray-900 border border-purple-950/60 p-4 rounded-xl flex items-center justify-between gap-4">

                                                        <h3 className="text-base font-bold text-white truncate">{item.title}</h3>
                                                        <p className="text-xs text-gray-400 truncate">{item.name}</p>
                                                    </div>
                                                    <div className="text-right shrink-0">
                                                        <p className="text-pink-500 font-bold text-lg">${item.price}</p>
                                                        <button 
                                                            onClick={() => removeFromCart(item.cartId, item.id)} 
                                                            className="text-xs text-red-400 hover:text-red-300 hover:underline mt-1"
                                                        >
                                                            移除商品
                                                        </button>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>

                                        {/* 訂單摘要 */}
                                        <div className="bg-gray-900 border border-purple-950/60 p-6 rounded-2xl h-fit">
                                            <h3 className="text-xl font-bold mb-4 text-white pb-3 border-b border-purple-950/60">付款資訊</h3>
                                            <div className="space-y-3 text-sm text-gray-300 mb-6">
                                                <div className="flex justify-between">
                                                    <span>商品總數</span>
                                                    <span>{cart.length} 件</span>
                                                </div>
                                                <div className="flex justify-between">
                                                    <span>折抵優惠碼</span>
                                                    <span className="text-green-400">-$0</span>
                                                </div>
                                                <div className="flex justify-between border-t border-purple-950/60 pt-3 text-lg font-bold text-white">
                                                    <span>總計</span>
                                                    <span className="text-pink-500">${cart.reduce((sum, item) => sum + item.price, 0)}</span>
                                                </div>
                                            </div>
                                            <button 
                                                onClick={handleCheckout} 
                                                className="w-full py-3.5 rounded-xl gradient-bg font-bold tracking-widest text-white shadow-lg shadow-pink-500/20 hover:scale-[1.02] active:scale-95 transition-all"
                                            >
                                                確認付款結帳
                                            </button>
                                        </div>
                                    </div>
                                )}
                            </div>
                        ) : (
                            /* 3. 各類商城分頁 (PC, iOS, Android) - 完美 1:1 正方形卡片展示 */
                            <div className="p-8 w-full max-w-7xl mx-auto">
                                <div className="mb-8">
                                    <h2 className="text-3xl font-extrabold uppercase tracking-wider gradient-text mb-2">
                                        {activeTab} 輔助代理商城
                                    </h2>
                                    <p className="text-gray-400 text-sm">首頁 / {activeTab === 'pc' ? '電腦端遊戲輔助' : activeTab === 'ios' ? '手機端蘋果專區' : '手機端安卓專區'}</p>
                                </div>

                                {filteredProducts.length === 0 ? (
                                    <p className="text-gray-400 text-center py-20 text-lg">該分類目前尚無上架商品，敬請期待！</p>
                                ) : (
                                    <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
                                        {filteredProducts.map(p => (
                                            <div 
                                                key={p.id} 
                                                className="flex flex-col group cursor-pointer" 
                                                onClick={() => setSelectedProduct(p)}
                                            >
                                                {/* 完美 1:1 正方形卡片容器 */}
                                                <div className="w-full aspect-square relative rounded-xl overflow-hidden border-2 border-purple-900/50 group-hover:border-pink-500 transition-all duration-300 shadow-[0_0_15px_rgba(0,0,0,0.5)] group-hover:shadow-[0_0_25px_rgba(219,39,119,0.4)] bg-gray-950">
                                                    {/* 商品圖片 */}
                                                    <img 
                                                        src={p.img} 
                                                        alt={p.name} 
                                                        className="w-full h-full object-cover transition-transform duration-500 group-hover:scale-110" 
                                                    />
                                                    
                                                    {/* 底部漸層遮罩 */}
                                                    <div className="absolute inset-0 bg-gradient-to-t from-black/95 via-black/20 to-transparent"></div>
                                                    
                                                    {/* 底部短標題橫幅 */}
                                                    <div className="absolute bottom-0 w-full p-4 text-center">
                                                        <h3 className="text-white font-extrabold text-lg tracking-wider drop-shadow-md">{p.title}</h3>
                                                    </div>
                                                    
                                                    {/* 懸停邊框發光 */}
                                                    <div className="absolute inset-0 border border-transparent group-hover:border-pink-500/50 rounded-xl transition-colors duration-300"></div>
                                                </div>
                                                
                                                {/* 卡片下方的詳細文字 (呼應 image_e86d27.jpg) */}
                                                <div className="mt-3.5 px-1 flex-grow">
                                                    <p className="text-gray-300 text-xs leading-relaxed group-hover:text-white transition-colors line-clamp-2 h-9 mb-1.5">
                                                        {p.name}
                                                    </p>
                                                    <div className="flex items-center justify-between">
                                                        <span className="text-pink-500 font-extrabold text-base">${p.price} 起</span>
                                                        <span className="text-[10px] bg-purple-950 text-purple-300 px-2 py-0.5 rounded border border-purple-800/40 font-mono">
                                                            庫存: {p.stock}
                                                        </span>
                                                    </div>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>
                        )}
                    </main>

                    {/* A. 商品詳細資訊彈跳視窗 (完美還原 image_e86565.jpg / image_e86523.jpg 質感) - 確保純色實體不透明 */}
                    {selectedProduct && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/85">
                            <div className="bg-gray-900 border-2 border-purple-500 rounded-2xl shadow-[0_0_50px_rgba(168,85,247,0.6)] max-w-xl w-full relative overflow-hidden animate-in fade-in zoom-in duration-300 max-h-[90vh] flex flex-col">
                                
                                {/* 關閉按鈕 */}
                                <button 
                                    onClick={() => setSelectedProduct(null)}
                                    className="absolute top-4 right-4 text-gray-400 hover:text-white transition-colors z-20"
                                >
                                    <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M6 18L18 6M6 6l12 12" /></svg>
                                </button>

                                {/* 彈窗主體內容 */}
                                <div className="p-6 md:p-8 overflow-y-auto space-y-6">
                                    {/* 頂部 LOGO 與標題 */}
                                    <div className="text-center space-y-1 pb-4 border-b border-purple-950">
                                        <div className="text-xl font-black gradient-text tracking-widest flex items-center justify-center gap-2">
                                            <span>⚔️</span> AXGSHOP 萊斯輔助商城
                                        </div>
                                        <h2 className="text-lg md:text-xl font-extrabold text-white mt-2 leading-relaxed">
                                            {selectedProduct.title} 輔助詳情頁
                                        </h2>
                                    </div>

                                    {/* 社群與教學超連結 (呈現如參考圖中的彩色按鈕) */}
                                    <div className="grid grid-cols-2 gap-3">
                                        <a 
                                            href={selectedProduct.discordUrl} 
                                            target="_blank"
                                            rel="noopener noreferrer"
                                            className="py-3 px-4 rounded-xl bg-orange-600 hover:bg-orange-700 text-center text-xs font-bold text-white transition-colors flex items-center justify-center gap-2"
                                        >
                                            💬 【官方 DISCORD 群】
                                        </a>
                                        <a 
                                            href={selectedProduct.guideUrl} 
                                            className="py-3 px-4 rounded-xl bg-cyan-600 hover:bg-cyan-700 text-center text-xs font-bold text-white transition-colors flex items-center justify-center gap-2"
                                        >
                                            📘 【查看購買教學】
                                        </a>
                                    </div>

                                    {/* 官方免責與操作公告 */}
                                    <div className="bg-purple-950 border border-purple-500/30 p-4 rounded-xl space-y-2 text-xs leading-relaxed">
                                        <div className="text-pink-500 font-extrabold flex items-center gap-1">
                                            <span>📢</span> [重要公告]
                                        </div>
                                        <p className="text-gray-300">
                                            因遊戲反作弊系統频繁更新，各類輔助在不同電腦上會因系統相容性產生不同的穩定度，請購買前務必【先行購買天卡+小號測試】。確認安全並滿意功能後，再行添購長時效卡密，安全至上！
                                        </p>
                                    </div>

                                    {/* 商品完整詳細說明 */}
                                    <div className="space-y-2">
                                        <h4 className="text-sm font-extrabold text-white">輔助特點說明：</h4>
                                        <p className="text-xs text-gray-400 leading-relaxed bg-gray-950 p-4 rounded-xl border border-purple-950/60">
                                            {selectedProduct.description}
                                        </p>
                                    </div>

                                    {/* 結帳資訊欄位 */}
                                    <div className="flex items-center justify-between pt-4 border-t border-purple-950">
                                        <div>
                                            <p className="text-xs text-gray-400">目前商品庫存: {selectedProduct.stock} 件</p>
                                            <p className="text-2xl font-black text-pink-500">${selectedProduct.price}</p>
                                        </div>
                                        <button 
                                            onClick={() => {
                                                addToCart(selectedProduct);
                                                setSelectedProduct(null);
                                            }}
                                            disabled={selectedProduct.stock === 0}
                                            className="px-6 py-3.5 rounded-xl gradient-bg font-bold tracking-widest text-white hover:opacity-95 active:scale-95 disabled:bg-gray-800 disabled:text-gray-500 disabled:pointer-events-none transition-all shadow-lg shadow-pink-500/20"
                                        >
                                            {selectedProduct.stock > 0 ? '🛒 加入購物車' : '❌ 已售罄'}
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* B. 會員登入彈跳視窗 - 純色實體不透明 */}
                    {showLoginModal && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/85">
                            <div className="bg-gray-900 border-2 border-purple-500 p-8 rounded-2xl shadow-[0_0_35px_rgba(168,85,247,0.4)] max-w-sm w-full relative animate-in fade-in zoom-in duration-200">
                                <div className="absolute top-4 right-4">
                                    <button 
                                        onClick={() => setShowLoginModal(false)}
                                        className="text-gray-400 hover:text-white transition-colors"
                                    >
                                        <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M6 18L18 6M6 6l12 12" /></svg>
                                    </button>
                                </div>
                                <h3 className="text-2xl font-bold mb-6 text-white tracking-widest">🔑 會員登入</h3>
                                <form onSubmit={handleLogin} className="space-y-4">
                                    <div>
                                        <label className="block text-xs font-bold text-gray-400 mb-2 uppercase tracking-wider">輸入會員名稱</label>
                                        <input 
                                            name="username" 
                                            type="text" 
                                            placeholder="請輸入帳號" 
                                            required 
                                            className="w-full bg-gray-950 border border-purple-900/60 rounded-xl p-3 text-white placeholder-gray-600 focus:outline-none focus:border-pink-500 transition-colors text-sm"
                                        />
                                    </div>
                                    <button 
                                        type="submit" 
                                        className="w-full py-3 rounded-xl font-bold text-white gradient-bg hover:opacity-90 transition-all text-sm tracking-widest"
                                    >
                                        確認登入
                                    </button>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ShopApp />);
    </script>
</body>
</html>
